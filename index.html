<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0b1020" />
    <meta
      name="description"
      content="A full-screen WebGL weather visualizer — GPU rain, snow, volumetric clouds, sun, storms and fog driven by your local weather via Open-Meteo."
    />
    <title>Weather Scenes — WebGL</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%230b1020'/%3E%3Ccircle cx='12' cy='12' r='6' fill='%23ffe6a8'/%3E%3Cpath d='M9 22h14a4 4 0 0 0 0-8 6 6 0 0 0-11-2 4.5 4.5 0 0 0-3 10z' fill='%23cdd8e6'/%3E%3C/svg%3E"
    />
    <link rel="preconnect" href="https://api.open-meteo.com" />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <canvas id="scene"></canvas>

    <noscript>
      <p class="noscript">This visualizer needs JavaScript and WebGL enabled.</p>
    </noscript>

    <!-- HUD: location + condition readout -->
    <div class="readout" id="readout" aria-live="polite">
      <div class="readout__condition" id="r-condition">Loading…</div>
      <div class="readout__meta">
        <span id="r-place">Locating…</span>
        <span class="readout__temp" id="r-temp"></span>
      </div>
    </div>

    <!-- Manual override dock -->
    <nav class="dock" id="dock" aria-label="Choose a weather scene">
      <button class="dock__toggle" id="dock-toggle" aria-expanded="true" title="Hide / show controls">
        <span class="dock__grip"></span>
      </button>
      <div class="dock__scenes" id="dock-scenes"></div>
      <button class="dock__auto" id="dock-auto" title="Return to live local weather">◎ Live</button>
    </nav>

    <div class="loading" id="loading"><div class="loading__orb"></div></div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
