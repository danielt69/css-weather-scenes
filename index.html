<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Weather Scenes — Pure CSS, No JavaScript</title>
<style>
  :root {
    --bg: #0d1117;
    --panel: #161b22;
    --panel-border: #232a33;
    --text: #e6edf3;
    --muted: #8b949e;
    --accent: #58a6ff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background:
      radial-gradient(1200px 600px at 50% -10%, rgba(88,166,255,0.10), transparent 60%),
      var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    min-height: 100vh;
    padding: 48px 20px 80px;
  }

  header {
    max-width: 1100px;
    margin: 0 auto 40px;
    text-align: center;
  }

  header h1 {
    font-size: clamp(1.8rem, 4vw, 2.6rem);
    font-weight: 800;
    letter-spacing: -0.02em;
    margin-bottom: 12px;
    background: linear-gradient(90deg, #e6edf3, var(--accent));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  header p {
    color: var(--muted);
    font-size: 1rem;
    max-width: 560px;
    margin: 0 auto;
    line-height: 1.6;
  }

  .badge {
    display: inline-block;
    margin-top: 16px;
    padding: 5px 14px;
    border: 1px solid var(--panel-border);
    border-radius: 999px;
    background: var(--panel);
    color: var(--accent);
    font-size: 0.8rem;
    font-weight: 600;
    letter-spacing: 0.04em;
  }

  .gallery {
    max-width: 1100px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 24px;
  }

  .card {
    position: relative;
    width: 100%;
    height: 320px;
    border-radius: 16px;
    overflow: hidden;
    border: 1px solid var(--panel-border);
    box-shadow: 0 10px 30px rgba(0,0,0,0.45);
  }

  .card .label {
    position: absolute;
    left: 14px;
    bottom: 14px;
    z-index: 20;
    padding: 6px 12px;
    border-radius: 8px;
    background: rgba(13,17,23,0.55);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    border: 1px solid rgba(255,255,255,0.08);
    font-size: 0.85rem;
    font-weight: 600;
    letter-spacing: 0.02em;
    color: #fff;
  }

  .scene {
    position: absolute;
    inset: 0;
    overflow: hidden;
  }

  /* ============ CLEAR DAY ============ */
  .clear-day {
    background: linear-gradient(180deg, #2b6fe0 0%, #5aa9f0 55%, #afd4f7 100%);
  }
  .sun {
    position: absolute;
    top: 90px; left: 50%;
    width: 86px; height: 86px;
    margin-left: -43px;
    border-radius: 50%;
    background: radial-gradient(circle at 50% 50%, #fff6c8 0%, #ffd23f 55%, #ffb300 100%);
    box-shadow: 0 0 40px 12px rgba(255,200,60,0.65);
  }
  .sun-rays {
    position: absolute;
    top: 90px; left: 50%;
    width: 180px; height: 180px;
    margin-left: -90px;
    animation: rotate 14s linear infinite;
  }
  .sun-rays span {
    position: absolute;
    top: 50%; left: 50%;
    width: 6px; height: 30px;
    margin: -15px 0 0 -3px;
    border-radius: 3px;
    background: rgba(255,224,130,0.85);
  }
  .sun-rays span:nth-child(1){ transform: rotate(0deg)   translateY(-66px); }
  .sun-rays span:nth-child(2){ transform: rotate(45deg)  translateY(-66px); }
  .sun-rays span:nth-child(3){ transform: rotate(90deg)  translateY(-66px); }
  .sun-rays span:nth-child(4){ transform: rotate(135deg) translateY(-66px); }
  .sun-rays span:nth-child(5){ transform: rotate(180deg) translateY(-66px); }
  .sun-rays span:nth-child(6){ transform: rotate(225deg) translateY(-66px); }
  .sun-rays span:nth-child(7){ transform: rotate(270deg) translateY(-66px); }
  .sun-rays span:nth-child(8){ transform: rotate(315deg) translateY(-66px); }

  @keyframes rotate {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  /* ============ CLEAR NIGHT ============ */
  .clear-night {
    background: linear-gradient(180deg, #0a0f2c 0%, #131a44 60%, #1d2658 100%);
  }
  .moon {
    position: absolute;
    top: 60px; right: 56px;
    width: 70px; height: 70px;
    border-radius: 50%;
    background: radial-gradient(circle at 38% 38%, #fdfbe8 0%, #d9dbe6 70%, #b9bccb 100%);
    box-shadow: inset -14px -10px 0 -2px #11173a, 0 0 28px 6px rgba(220,225,255,0.35);
  }
  .star {
    position: absolute;
    width: 3px; height: 3px;
    border-radius: 50%;
    background: #fff;
    animation: twinkle 2.4s ease-in-out infinite;
  }
  .star::after {
    content: ""; position: absolute; inset: -1px;
    border-radius: 50%; box-shadow: 0 0 6px 1px rgba(255,255,255,0.8);
  }
  .star.s1 { top: 40px;  left: 36px;  animation-delay: 0s;    }
  .star.s2 { top: 70px;  left: 90px;  animation-delay: 0.6s;  width:2px; height:2px; }
  .star.s3 { top: 30px;  left: 140px; animation-delay: 1.2s;  }
  .star.s4 { top: 120px; left: 50px;  animation-delay: 0.3s;  width:2px; height:2px; }
  .star.s5 { top: 150px; left: 120px; animation-delay: 1.6s;  }
  .star.s6 { top: 180px; left: 200px; animation-delay: 0.9s;  width:4px; height:4px; }
  .star.s7 { top: 95px;  left: 180px; animation-delay: 2.0s;  }
  .star.s8 { top: 210px; left: 80px;  animation-delay: 1.4s;  width:2px; height:2px; }
  .star.s9 { top: 55px;  left: 220px; animation-delay: 0.5s;  }

  @keyframes twinkle {
    0%, 100% { opacity: 0.2; transform: scale(0.7); }
    50%      { opacity: 1;   transform: scale(1.15); }
  }

  /* ============ SHARED CLOUDS ============ */
  .cloud {
    position: absolute;
    border-radius: 999px;
  }
  .cloud::before, .cloud::after {
    content: ""; position: absolute; border-radius: 50%; background: inherit;
  }

  /* ============ RAIN ============ */
  .rain {
    background: linear-gradient(180deg, #3a4250 0%, #4a5260 55%, #5d6675 100%);
  }
  .rain .cloud {
    top: 56px; left: 50%;
    width: 130px; height: 40px;
    margin-left: -65px;
    background: #aab1bd;
    animation: cloud-drift 9s ease-in-out infinite alternate;
  }
  .rain .cloud::before { width: 56px; height: 56px; top: -26px; left: 18px; }
  .rain .cloud::after  { width: 72px; height: 72px; top: -36px; left: 52px; }
  .raindrop {
    position: absolute;
    top: -20px;
    width: 2px; height: 16px;
    border-radius: 2px;
    background: linear-gradient(180deg, rgba(180,210,255,0.1), rgba(180,210,255,0.85));
    animation: fall-rain 0.9s linear infinite;
  }
  .raindrop:nth-child(2){ left: 40px;  animation-delay: 0.0s;  }
  .raindrop:nth-child(3){ left: 70px;  animation-delay: 0.35s; }
  .raindrop:nth-child(4){ left: 100px; animation-delay: 0.15s; }
  .raindrop:nth-child(5){ left: 130px; animation-delay: 0.5s;  }
  .raindrop:nth-child(6){ left: 160px; animation-delay: 0.25s; }
  .raindrop:nth-child(7){ left: 190px; animation-delay: 0.45s; }
  .raindrop:nth-child(8){ left: 215px; animation-delay: 0.1s;  }
  .raindrop:nth-child(9){ left: 55px;  animation-delay: 0.6s;  }
  .raindrop:nth-child(10){ left: 145px; animation-delay: 0.7s; }

  @keyframes fall-rain {
    0%   { transform: translateY(0);    opacity: 0; }
    10%  { opacity: 1; }
    100% { transform: translateY(300px); opacity: 0.4; }
  }
  @keyframes cloud-drift {
    from { transform: translateX(-14px); }
    to   { transform: translateX(14px); }
  }

  /* ============ SNOW ============ */
  .snow {
    background: linear-gradient(180deg, #4c5a73 0%, #6b7a95 55%, #9aa8bf 100%);
  }
  .snowflake {
    position: absolute;
    top: -16px;
    border-radius: 50%;
    background: #fff;
    box-shadow: 0 0 4px rgba(255,255,255,0.8);
    animation: fall-snow linear infinite;
  }
  .snowflake:nth-child(1){ left: 24px;  width: 8px;  height: 8px;  animation-duration: 5s;   animation-delay: 0s;   }
  .snowflake:nth-child(2){ left: 60px;  width: 5px;  height: 5px;  animation-duration: 6.5s; animation-delay: 1s;   }
  .snowflake:nth-child(3){ left: 95px;  width: 10px; height: 10px; animation-duration: 4.5s; animation-delay: 0.5s; }
  .snowflake:nth-child(4){ left: 130px; width: 6px;  height: 6px;  animation-duration: 6s;   animation-delay: 2s;   }
  .snowflake:nth-child(5){ left: 165px; width: 9px;  height: 9px;  animation-duration: 5.5s; animation-delay: 0.8s; }
  .snowflake:nth-child(6){ left: 200px; width: 4px;  height: 4px;  animation-duration: 7s;   animation-delay: 1.4s; }
  .snowflake:nth-child(7){ left: 230px; width: 7px;  height: 7px;  animation-duration: 5s;   animation-delay: 2.2s; }
  .snowflake:nth-child(8){ left: 45px;  width: 6px;  height: 6px;  animation-duration: 6.8s; animation-delay: 3s;   }
  .snowflake:nth-child(9){ left: 115px; width: 5px;  height: 5px;  animation-duration: 5.8s; animation-delay: 1.7s; }
  .snowflake:nth-child(10){ left: 180px; width: 8px; height: 8px;  animation-duration: 4.8s; animation-delay: 2.6s; }

  @keyframes fall-snow {
    0%   { transform: translate(0, 0);          opacity: 0; }
    10%  { opacity: 1; }
    50%  { transform: translate(16px, 170px); }
    100% { transform: translate(-12px, 340px);  opacity: 0.3; }
  }

  /* ============ THUNDERSTORM ============ */
  .thunderstorm {
    position: relative;
    background: linear-gradient(180deg, #1b2030 0%, #262c3e 55%, #313850 100%);
  }
  .thunderstorm .flash {
    position: absolute; inset: 0; z-index: 5;
    background: radial-gradient(circle at 50% 35%, rgba(255,255,210,0.9), rgba(255,255,210,0) 60%);
    opacity: 0;
    animation: flash 4s steps(1, end) infinite;
  }
  .thunderstorm .cloud {
    top: 50px; left: 50%;
    width: 140px; height: 44px;
    margin-left: -70px;
    background: #3a4257;
    z-index: 6;
  }
  .thunderstorm .cloud::before { width: 60px; height: 60px; top: -28px; left: 16px; }
  .thunderstorm .cloud::after  { width: 80px; height: 80px; top: -40px; left: 54px; }
  .bolt {
    position: absolute;
    top: 96px; left: 50%;
    margin-left: -10px;
    width: 24px; height: 60px;
    z-index: 7;
    background: #ffe14d;
    clip-path: polygon(55% 0, 20% 55%, 48% 55%, 30% 100%, 80% 40%, 50% 40%, 70% 0);
    filter: drop-shadow(0 0 8px rgba(255,225,80,0.9));
    opacity: 0;
    animation: bolt-strike 4s steps(1, end) infinite;
  }
  @keyframes flash {
    0%, 100% { opacity: 0; }
    48%      { opacity: 0; }
    50%      { opacity: 0.95; }
    52%      { opacity: 0.1; }
    54%      { opacity: 0.8; }
    57%      { opacity: 0; }
  }
  @keyframes bolt-strike {
    0%, 100% { opacity: 0; }
    49%      { opacity: 0; }
    50%      { opacity: 1; }
    56%      { opacity: 1; }
    58%      { opacity: 0; }
  }

  /* ============ FOG ============ */
  .fog {
    background: linear-gradient(180deg, #5a6473 0%, #79828f 55%, #99a1ac 100%);
  }
  .fog-layer {
    position: absolute;
    height: 46px;
    border-radius: 999px;
    background: rgba(230,233,238,0.30);
    filter: blur(8px);
  }
  .fog-layer.f1 { top: 70px;  left: -60px; width: 200px; animation: drift 11s ease-in-out infinite alternate; }
  .fog-layer.f2 { top: 120px; left: -40px; width: 240px; background: rgba(230,233,238,0.22); animation: drift 14s ease-in-out infinite alternate-reverse; }
  .fog-layer.f3 { top: 170px; left: -80px; width: 220px; background: rgba(230,233,238,0.26); animation: drift 9s  ease-in-out infinite alternate; }
  .fog-layer.f4 { top: 220px; left: -50px; width: 260px; background: rgba(230,233,238,0.18); animation: drift 13s ease-in-out infinite alternate-reverse; }

  @keyframes drift {
    from { transform: translateX(0); }
    to   { transform: translateX(120px); }
  }

  footer {
    max-width: 1100px;
    margin: 56px auto 0;
    text-align: center;
    color: var(--muted);
    font-size: 0.9rem;
    line-height: 1.7;
  }
  footer a { color: var(--accent); text-decoration: none; }
  footer a:hover { text-decoration: underline; }

  @media (max-width: 390px) {
    .gallery { grid-template-columns: 1fr; }
  }

  @media (prefers-reduced-motion: reduce) {
    .sun-rays, .star, .raindrop, .snowflake, .flash, .bolt,
    .fog-layer, .rain .cloud {
      animation: none !important;
    }
    .star { opacity: 0.85; }
  }
</style>
</head>
<body>
  <header>
    <h1>CSS Weather Scenes</h1>
    <p>Six animated weather scenes built with nothing but HTML and CSS. No JavaScript. No images. No external resources.</p>
    <span class="badge">Pure CSS · Zero JS</span>
  </header>

  <main class="gallery">

    <!-- Clear Day -->
    <div class="card">
      <div class="scene clear-day">
        <div class="sun-rays">
          <span></span><span></span><span></span><span></span>
          <span></span><span></span><span></span><span></span>
        </div>
        <div class="sun"></div>
      </div>
      <span class="label">Clear Day</span>
    </div>

    <!-- Clear Night -->
    <div class="card">
      <div class="scene clear-night">
        <span class="star s1"></span><span class="star s2"></span>
        <span class="star s3"></span><span class="star s4"></span>
        <span class="star s5"></span><span class="star s6"></span>
        <span class="star s7"></span><span class="star s8"></span>
        <span class="star s9"></span>
        <div class="moon"></div>
      </div>
      <span class="label">Clear Night</span>
    </div>

    <!-- Rain -->
    <div class="card">
      <div class="scene rain">
        <span class="raindrop"></span><span class="raindrop"></span>
        <span class="raindrop"></span><span class="raindrop"></span>
        <span class="raindrop"></span><span class="raindrop"></span>
        <span class="raindrop"></span><span class="raindrop"></span>
        <span class="raindrop"></span><span class="raindrop"></span>
        <div class="cloud"></div>
      </div>
      <span class="label">Rain</span>
    </div>

    <!-- Snow -->
    <div class="card">
      <div class="scene snow">
        <span class="snowflake"></span><span class="snowflake"></span>
        <span class="snowflake"></span><span class="snowflake"></span>
        <span class="snowflake"></span><span class="snowflake"></span>
        <span class="snowflake"></span><span class="snowflake"></span>
        <span class="snowflake"></span><span class="snowflake"></span>
      </div>
      <span class="label">Snow</span>
    </div>

    <!-- Thunderstorm -->
    <div class="card">
      <div class="scene thunderstorm">
        <div class="flash"></div>
        <div class="bolt"></div>
        <div class="cloud"></div>
      </div>
      <span class="label">Thunderstorm</span>
    </div>

    <!-- Fog -->
    <div class="card">
      <div class="scene fog">
        <div class="fog-layer f1"></div>
        <div class="fog-layer f2"></div>
        <div class="fog-layer f3"></div>
        <div class="fog-layer f4"></div>
      </div>
      <span class="label">Fog</span>
    </div>

  </main>

  <footer>
    <p>Hand-coded with HTML &amp; CSS only — view source, there is not a single line of JavaScript.</p>
  </footer>
</body>
</html>
